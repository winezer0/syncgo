# Shuttle 同步配置文件
# 用法: shuttle push [任务名]

version: "1.0"
# 全局默认值（可选）
language: zh               # en / zh
checksum: xxh64            # 校验和算法: md5 / sha256 / xxh64
workers: 4                 # delta 并行数: 1=串行 2/4/8=并行

# 服务器连接配置
servers:
  - name: myserver
    host: 192.168.1.100
    port: 22
    user: deploy
    key_file: ~/.ssh/id_ed25519
    # password: your_password  # 不推荐用密码
    protect:                 # 保护列表：匹配的远端文件绝不覆盖/删除
      - "*.db"
      - "*.pem"
      - "config.yaml"
      - "secrets/"

# 同步任务列表
tasks:
  - name: web
    source: E:\projects\website\dist\
    target: myserver:/var/www/html/
    options:
      delete: true          # 删除远程多余文件
      exclude:
        - "*.tmp"
        - ".DS_Store"
      compress: false
      checksum: false       # true: 用校验和对比; false: 用时间+大小
      flat: false            # true: 直接映射内容不套源文件夹名
      show_dots: false       # true: 同步隐藏文件（.开头）, 默认false=跳过

  - name: api
    source: E:\projects\api\
    target: myserver:/opt/app/api/
    options:
      delete: false
      exclude:
        - ".git/"
        - "*.log"
        - "__pycache__/"
      checksum: false
