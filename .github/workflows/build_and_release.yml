name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 0.0.1)'
        required: true
        default: '0.0.1'
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            artifact-name: syncgo_windows_amd64.exe
          - goos: windows
            goarch: arm64
            artifact-name: syncgo_windows_arm64.exe
          - goos: linux
            goarch: amd64
            artifact-name: syncgo_linux_amd64
          - goos: linux
            goarch: arm64
            artifact-name: syncgo_linux_arm64
          - goos: darwin
            goarch: amd64
            artifact-name: syncgo_darwin_amd64
          - goos: darwin
            goarch: arm64
            artifact-name: syncgo_darwin_arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ver=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "ver=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.versionStr=${{ steps.version.outputs.ver }}" \
            -o ${{ matrix.artifact-name }} ./cmd/syncgo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded files
        run: |
          echo "Artifacts:"
          find ./artifacts -type f | sort

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ver=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "ver=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Get current date
        id: date
        run: |
          echo "builddate=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          name: SyncGo v${{ steps.version.outputs.ver }}
          body: |
            ## SyncGo v${{ steps.version.outputs.ver }}

            跨平台增量文件同步工具 — rsync delta 算法，仅传输文件变化部分。

            ### 构建信息
            - 版本号: ${{ steps.version.outputs.ver }}
            - 构建日期: ${{ steps.date.outputs.builddate }}
            - CGO: 禁用（完全静态二进制，无 .so 依赖）

            ### 下载说明

            | 文件 | 平台 | 用途 |
            |------|------|------|
            | `syncgo_windows_amd64.exe` | Windows x64 | 主程序 |
            | `syncgo_windows_arm64.exe` | Windows ARM64 | 主程序 |
            | `syncgo_linux_amd64` | Linux x64 | 主程序 / 远端 Agent |
            | `syncgo_linux_arm64` | Linux ARM64 | 主程序 / 远端 Agent |
            | `syncgo_darwin_amd64` | macOS Intel | 主程序 |
            | `syncgo_darwin_arm64` | macOS Apple Silicon | 主程序 |

            ### Agent 部署

            Linux 二进制可直接作为远端 delta agent 使用：
            ```bash
            # 方式1: 自动部署（推荐）
            syncgo deploy-agent <server>

            # 方式2: 手动放置
            # 将 syncgo_linux_<arch> 放在 syncgo.exe 同级目录
            # deploy-agent 会自动识别并上传
            ```

            ### 校验和算法
            支持 xxh64（默认）/ xxh3 / md5 / sha256，amd64 平台含 SIMD 加速。
          files: |
            ./artifacts/syncgo_windows_amd64.exe/syncgo_windows_amd64.exe
            ./artifacts/syncgo_windows_arm64.exe/syncgo_windows_arm64.exe
            ./artifacts/syncgo_linux_amd64/syncgo_linux_amd64
            ./artifacts/syncgo_linux_arm64/syncgo_linux_arm64
            ./artifacts/syncgo_darwin_amd64/syncgo_darwin_amd64
            ./artifacts/syncgo_darwin_arm64/syncgo_darwin_arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
